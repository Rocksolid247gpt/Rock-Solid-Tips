<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Driver Intake</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px;">
  <h1>Driver Intake</h1>
  <p>Complete this form after joining.</p>

  <form>
    <label>Full Name</label><br />
    <input required style="width:100%;padding:10px;margin:8px 0 18px" type="text" /><br />

    <label>Email</label><br />
    <input required style="width:100%;padding:10px;margin:8px 0 18px" type="email" /><br />

    <label>Primary Driving Platform (optional)</label><br />
    <input style="width:100%;padding:10px;margin:8px 0 18px" type="text" /><br />

    <label>Your Stripe Tip Link (required)</label><br />
    <input required style="width:100%;padding:10px;margin:8px 0 18px" type="url" placeholder="https://buy.stripe.com/..." /><br />

    <button type="submit" style="padding:12px 16px;">Submit</button>
  </form>
</body>
</html>
